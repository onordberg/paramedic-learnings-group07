<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Windows 3.11 style bell icon, 32x32 pixel grid, 16-color VGA palette -->
  <!-- Palette: black #000000, dk gray #808080, lt gray #C0C0C0, white #FFFFFF,
       yellow #FFFF00, dk yellow/brown #808000, red highlight not used -->

  <!-- Background transparent; uncomment for classic teal desktop -->
  <!-- <rect width="32" height="32" fill="#008080"/> -->

  <!-- Top handle/loop (dark gray) -->
  <rect x="15" y="3"  width="2" height="1" fill="#000000"/>
  <rect x="14" y="4"  width="1" height="1" fill="#000000"/>
  <rect x="17" y="4"  width="1" height="1" fill="#000000"/>
  <rect x="15" y="4"  width="2" height="1" fill="#808000"/>
  <rect x="14" y="5"  width="1" height="2" fill="#000000"/>
  <rect x="17" y="5"  width="1" height="2" fill="#000000"/>
  <rect x="15" y="5"  width="2" height="2" fill="#808000"/>

  <!-- Bell top cap -->
  <rect x="13" y="7"  width="6" height="1" fill="#000000"/>
  <rect x="12" y="8"  width="1" height="1" fill="#000000"/>
  <rect x="19" y="8"  width="1" height="1" fill="#000000"/>
  <rect x="13" y="8"  width="6" height="1" fill="#FFFF00"/>

  <!-- Bell body (rows widening) -->
  <!-- row y=9 -->
  <rect x="11" y="9"  width="1" height="1" fill="#000000"/>
  <rect x="20" y="9"  width="1" height="1" fill="#000000"/>
  <rect x="12" y="9"  width="1" height="1" fill="#FFFFFF"/>
  <rect x="13" y="9"  width="6" height="1" fill="#FFFF00"/>
  <rect x="19" y="9"  width="1" height="1" fill="#808000"/>

  <!-- row y=10 -->
  <rect x="11" y="10" width="1" height="1" fill="#000000"/>
  <rect x="20" y="10" width="1" height="1" fill="#000000"/>
  <rect x="12" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="13" y="10" width="6" height="1" fill="#FFFF00"/>
  <rect x="19" y="10" width="1" height="1" fill="#808000"/>

  <!-- row y=11 -->
  <rect x="10" y="11" width="1" height="1" fill="#000000"/>
  <rect x="21" y="11" width="1" height="1" fill="#000000"/>
  <rect x="11" y="11" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="11" width="8" height="1" fill="#FFFF00"/>
  <rect x="20" y="11" width="1" height="1" fill="#808000"/>

  <!-- row y=12 -->
  <rect x="10" y="12" width="1" height="1" fill="#000000"/>
  <rect x="21" y="12" width="1" height="1" fill="#000000"/>
  <rect x="11" y="12" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="12" width="8" height="1" fill="#FFFF00"/>
  <rect x="20" y="12" width="1" height="1" fill="#808000"/>

  <!-- row y=13 -->
  <rect x="9"  y="13" width="1" height="1" fill="#000000"/>
  <rect x="22" y="13" width="1" height="1" fill="#000000"/>
  <rect x="10" y="13" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="13" width="10" height="1" fill="#FFFF00"/>
  <rect x="21" y="13" width="1" height="1" fill="#808000"/>

  <!-- row y=14 -->
  <rect x="9"  y="14" width="1" height="1" fill="#000000"/>
  <rect x="22" y="14" width="1" height="1" fill="#000000"/>
  <rect x="10" y="14" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="14" width="10" height="1" fill="#FFFF00"/>
  <rect x="21" y="14" width="1" height="1" fill="#808000"/>

  <!-- row y=15 -->
  <rect x="8"  y="15" width="1" height="1" fill="#000000"/>
  <rect x="23" y="15" width="1" height="1" fill="#000000"/>
  <rect x="9"  y="15" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="15" width="12" height="1" fill="#FFFF00"/>
  <rect x="22" y="15" width="1" height="1" fill="#808000"/>

  <!-- row y=16 -->
  <rect x="8"  y="16" width="1" height="1" fill="#000000"/>
  <rect x="23" y="16" width="1" height="1" fill="#000000"/>
  <rect x="9"  y="16" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="16" width="12" height="1" fill="#FFFF00"/>
  <rect x="22" y="16" width="1" height="1" fill="#808000"/>

  <!-- row y=17 -->
  <rect x="7"  y="17" width="1" height="1" fill="#000000"/>
  <rect x="24" y="17" width="1" height="1" fill="#000000"/>
  <rect x="8"  y="17" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9"  y="17" width="14" height="1" fill="#FFFF00"/>
  <rect x="23" y="17" width="1" height="1" fill="#808000"/>

  <!-- row y=18 -->
  <rect x="7"  y="18" width="1" height="1" fill="#000000"/>
  <rect x="24" y="18" width="1" height="1" fill="#000000"/>
  <rect x="8"  y="18" width="1" height="1" fill="#FFFFFF"/>
  <rect x="9"  y="18" width="14" height="1" fill="#FFFF00"/>
  <rect x="23" y="18" width="1" height="1" fill="#808000"/>

  <!-- row y=19 - flare lip, with shadow notches -->
  <rect x="6"  y="19" width="1" height="1" fill="#000000"/>
  <rect x="25" y="19" width="1" height="1" fill="#000000"/>
  <rect x="7"  y="19" width="1" height="1" fill="#FFFFFF"/>
  <rect x="8"  y="19" width="16" height="1" fill="#FFFF00"/>
  <rect x="24" y="19" width="1" height="1" fill="#808000"/>

  <!-- row y=20 - bottom rim band (darker) -->
  <rect x="6"  y="20" width="1" height="1" fill="#000000"/>
  <rect x="25" y="20" width="1" height="1" fill="#000000"/>
  <rect x="7"  y="20" width="18" height="1" fill="#808000"/>

  <!-- row y=21 - rim outline -->
  <rect x="6"  y="21" width="20" height="1" fill="#000000"/>

  <!-- Clapper -->
  <rect x="15" y="22" width="2" height="1" fill="#000000"/>
  <rect x="14" y="23" width="1" height="1" fill="#000000"/>
  <rect x="17" y="23" width="1" height="1" fill="#000000"/>
  <rect x="15" y="23" width="2" height="1" fill="#808000"/>
  <rect x="14" y="24" width="1" height="2" fill="#000000"/>
  <rect x="17" y="24" width="1" height="2" fill="#000000"/>
  <rect x="15" y="24" width="2" height="2" fill="#808000"/>
  <rect x="15" y="26" width="2" height="1" fill="#000000"/>
</svg>
